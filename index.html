<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cravings — Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #fffaf5;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      max-width: 720px;
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,.08);
    }

    .logo {
      font-size: 56px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .accent {
      color: #f97316;
    }

    p {
      color: #6b7280;
      line-height: 1.8;
      font-size: 1.05rem;
      margin-bottom: 18px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a {
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      transition: .2s;
    }

    .primary {
      background: #f97316;
      color: white;
    }

    .primary:hover {
      background: #ea580c;
    }

    .secondary {
      border: 2px solid #f97316;
      color: #f97316;
    }

    .secondary:hover {
      background: #fff1e8;
    }

    footer {
      margin-top: 42px;
      color: #9ca3af;
      font-size: .95rem;
    }

    footer a {
      color: #f97316;
      padding: 0;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">🍔</div>

  <h1>Cravings</h1>

  <p>
    Delicious experiences are cooking! 🚀
  </p>

  <p>
    Cravings is currently under active development.
    The frontend is being crafted to deliver a fast,
    modern and seamless food ordering experience.
  </p>

  <div class="buttons">
    <a class="primary"
       href="https://github.com/abirabdullahs/Cravings"
       target="_blank">
       View GitHub Repository
    </a>

    <a class="secondary"
       href="https://abirabdullah.me"
       target="_blank">
       Developer Portfolio
    </a>
  </div>

  <footer>
    Developing by
    <a href="https://abirabdullah.me" target="_blank">
      Abir Abdullah
    </a>
  </footer>

</div>

</body>
</html>
